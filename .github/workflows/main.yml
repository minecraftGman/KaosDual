name: Build KAOS Firmware

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:

  # -------------------------------------------------------------------------
  # Job 1: Build Pi Pico firmware
  # -------------------------------------------------------------------------
  build-pico:
    name: Build Pi Pico (.uf2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake gcc-arm-none-eabi \
            libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib \
            build-essential git python3

      - name: Clone Pico SDK
        run: |
          git clone --depth 1 --branch 1.5.1 \
            https://github.com/raspberrypi/pico-sdk.git
          cd pico-sdk && git submodule update --init --depth 1

      - name: Build firmware for Pi Pico
        run: |
          cd pico && mkdir build && cd build
          cmake .. \
            -DPICO_SDK_PATH=${{ github.workspace }}/pico-sdk \
            -DPICO_BOARD=pico \
            -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)

      - uses: actions/upload-artifact@v4
        with:
          name: kaos-pico-firmware
          path: pico/build/kaos_pico.uf2
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # Job 2: Build RP2040 Zero firmware
  # -------------------------------------------------------------------------
  build-rp2040-zero:
    name: Build RP2040 Zero (.uf2)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y cmake gcc-arm-none-eabi \
            libnewlib-arm-none-eabi libstdc++-arm-none-eabi-newlib \
            build-essential git python3

      - name: Clone Pico SDK
        run: |
          git clone --depth 1 --branch 1.5.1 \
            https://github.com/raspberrypi/pico-sdk.git
          cd pico-sdk && git submodule update --init --depth 1

      - name: Build
        run: |
          cd pico && mkdir build && cd build
          cmake .. \
            -DPICO_SDK_PATH=${{ github.workspace }}/pico-sdk \
            -DPICO_BOARD=waveshare_rp2040_zero \
            -DCMAKE_BUILD_TYPE=Release
          make -j$(nproc)
          mv kaos_pico.uf2 kaos_rp2040_zero.uf2

      - uses: actions/upload-artifact@v4
        with:
          name: kaos-rp2040-zero-firmware
          path: pico/build/kaos_rp2040_zero.uf2
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # Job 3: Build ESP32 firmware
  # -------------------------------------------------------------------------
  build-esp32:
    name: Build ESP32 (.bin)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build ESP32 firmware
        uses: espressif/esp-idf-ci-action@v1
        with:
          esp_idf_version: v5.1.2
          target: esp32
          path: esp32
          command: idf.py build

      - uses: actions/upload-artifact@v4
        with:
          name: kaos-esp32-firmware
          path: |
            esp32/build/kaos_esp32_dual.bin
            esp32/build/bootloader/bootloader.bin
            esp32/build/partition_table/partition-table.bin
            esp32/build/flash_args
          if-no-files-found: error

  # -------------------------------------------------------------------------
  # Job 4: Bundle everything
  # -------------------------------------------------------------------------
  bundle:
    name: Bundle firmware
    runs-on: ubuntu-latest
    needs: [build-pico, build-rp2040-zero, build-esp32]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: kaos-pico-firmware
          path: bundle/pico

      - uses: actions/download-artifact@v4
        with:
          name: kaos-rp2040-zero-firmware
          path: bundle/rp2040-zero

      - uses: actions/download-artifact@v4
        with:
          name: kaos-esp32-firmware
          path: bundle/esp32

      - name: Write flash instructions
        run: |
          cat > bundle/HOW_TO_FLASH.txt << 'INSTEOF'
          ╔══════════════════════════════════════════════════╗
          ║           KAOS Dual Firmware Bundle              ║
          ╚══════════════════════════════════════════════════╝

          ── RP2040 Boards (Pi Pico or RP2040 Zero) ─────────

          Pi Pico:      bundle/pico/kaos_pico.uf2
          RP2040 Zero:  bundle/rp2040-zero/kaos_rp2040_zero.uf2

          Flash instructions (same for both):
          1. Hold BOOTSEL button
          2. Plug into PC via USB while holding BOOTSEL
          3. Release — mounts as RPI-RP2 drive
          4. Drag the .uf2 file onto the drive
          5. Board reboots automatically

          ── ESP32 ───────────────────────────────────────────

          esptool.py --chip esp32 --port COM3 --baud 460800 \
            write_flash \
            0x1000  esp32/bootloader.bin \
            0x8000  esp32/partition-table.bin \
            0x10000 esp32/kaos_esp32_dual.bin

          (Replace COM3 with your port)

          ── Wiring ──────────────────────────────────────────

          ESP32 GPIO17  →  RP2040 GPIO5  (UART TX→RX)
          ESP32 GPIO16  ←  RP2040 GPIO4  (UART RX←TX)
          ESP32 GND     ─  RP2040 GND
          RP2040 VBUS   →  ESP32 VIN     (power from console USB)

          ── First boot ──────────────────────────────────────
          1. Plug RP2040 into console via USB
          2. Connect to WiFi: KAOS-Portal  pw: skylands1
          3. Open browser: http://192.168.4.1
          INSTEOF

      - uses: actions/upload-artifact@v4
        with:
          name: kaos-firmware-bundle
          path: bundle/
          if-no-files-found: error
